# ===========================================================================
#                      VOS-RS 全局系统与 LLM 核心配置文件
#                            config/vos_config.yaml
# ===========================================================================

server:
  host: "0.0.0.0"
  port: 8081
  environment: "production"

# ---------------------------------------------------------------------------
# 🤖 大模型 (LLM) 与 AI Voice Agent 核心对接配置
# ---------------------------------------------------------------------------
# 注意：以下 API Key 仅为本地测试用途，请勿提交到生产仓库。
#       可通过环境变量 VOS_RS_LLM_API_KEY 覆盖此处的值。
llm_integration:
  # 是否启用 LLM 集成 (true / false)
  enabled: true

  # 模型提供商: "zhipu" | "openai" | "gemini" | "deepseek" | "local_vllm" | "ollama"
  provider: "zhipu"

  # 大模型 API 密钥 (API Key) — 智谱 GLM-4.7-flash 测试 Key
  api_key: "6f86ed5fe1c04366918e12e5170f4660.CRsePLgiumNbWmh0"

  # 大模型 REST 基础 Endpoint 地址 (智谱 OpenAI 兼容协议)
  base_url: "https://open.bigmodel.cn/api/paas/v4"

  # 默认模型名称 (GLM-4.7-flash 完全免费)
  model: "glm-4.7-flash"

  # OpenAI Realtime 全双工音频 Token 直连 WebSocket 地址 (选填)
  realtime_websocket_url: ""

  # 采样温度 (0.0 ~ 1.0)
  temperature: 0.3

  # 音频打断 (Barge-in) 静音检测敏感度 (0.0 ~ 1.0)
  vad_threshold: 0.65

# ---------------------------------------------------------------------------
# 🛡️ SBC 边界安全与 AI 防诈骗配置
# ---------------------------------------------------------------------------
security:
  anti_fraud:
    # 是否开启 ECAPA-TDNN AI 伪造假音检测
    deepfake_detection_enabled: true
    # 假音判定置信度门限 (达到则触发 SIP 403 / BYE 挂断)
    deepfake_threshold: 0.90

# ---------------------------------------------------------------------------
# 🌐 全球 Anycast Mesh 叠加网络配置
# ---------------------------------------------------------------------------
global_mesh:
  enabled: true
  node_id: "node-cn-shanghai-01"
  region: "ap-east-1"
  fec_parity_ratio: 0.15 # 15% 冗余前向纠错率 (保证丢包率 < 0.1%)
