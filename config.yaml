# VOS-RS 全局引导与基础服务多级配置文件

logging:
  filter: "info"

auth:
  enabled: false

performance:
  udp_workers: 16
  udp_receive_buffer_bytes: 16777216
  udp_send_buffer_bytes: 16777216

# ==========================================
# 1. 基础设施连接配置 (Connections)
# ==========================================
connections:
  database:
    host: "127.0.0.1"
    port: 5432
    username: "tangyu"
    password: ""  # 开发环境无密码；生产环境留空将自动使用 VOS_RS_DATABASE_URL 覆盖
    database: "vos_rs"
    max_connections: 50
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""  # 开发环境无密码；生产环境留空将自动使用 VOS_RS_REDIS_URL 覆盖
    database: 0
    max_connections: 50
  nats:
    url: "nats://127.0.0.1:4222"
    cdr_stream: "VOS_RS_CDR"
    cdr_subject: "vos_rs.cdr"
  s3:
    backend: "s3"
    local_dir: "recordings"
    endpoint: "https://s3.amazonaws.com"
    bucket: "vos-rs-recordings"
    access_key: "YOUR_ACCESS_KEY_HERE"
    secret_key: "YOUR_SECRET_KEY_HERE"
    region: "us-east-1"
    key_prefix: "recordings/"

# ==========================================
# 独立媒体边缘服务
# ==========================================
media_edge:
  control_bind: "0.0.0.0:3030"
  control_token: "change-me"
  uds_path: "/tmp/media-edge.sock"
  recording_workers: 4
  recording_queue_capacity: 10000

# ==========================================
# 原生 SIP 集群入口（router_mode=native 时启用）
# ==========================================
sip_router:
  udp_bind: "0.0.0.0:5070"
  tcp_bind: "0.0.0.0:5070"
  advertised_addr: "127.0.0.1:5070"
  node_key_prefix: "vos_rs:cluster:sip_nodes"
  discovery_interval_secs: 2
  transaction_ttl_secs: 64
  dialog_route_ttl_secs: 86400
  udp_workers: 0 # 0=按 CPU 核数自动，最大 64
  udp_queue_capacity: 4096 # 每个 worker 的有界队列
  max_transactions: 1000000
  tcp_max_connections: 10000
  tcp_write_queue_capacity: 1024
  tcp_idle_timeout_secs: 300
  tcp_connect_timeout_secs: 3
  manage_bind: "127.0.0.1:8083" # 健康检查与 Prometheus 指标，仅建议内网暴露
  acl_allow: [] # 空列表允许全部；生产建议配置可信运营商/内网 CIDR
  acl_block: []
  rate_limit_capacity: 200 # 每个来源 IP 的令牌桶容量
  rate_limit_fill_rate: 100 # 每秒补充令牌数
  rate_limit_max_entries: 100000

# ==========================================
# 2. sip-edge 信令边缘网关服务配置
# ==========================================
sip_edge:
  # 集群关闭时保持原有单节点直连行为。生产集群可选择 external 或 native。
  cluster:
    enabled: false
    node_id: "sip-edge-1"
    router_mode: "direct" # direct | external | native
    advertised_addr: "127.0.0.1:5060"
    # 集群模式下的管理 API 地址。单节点模式（enabled: false）应留空，
    # api-server 会自动回退到 sip_edge.network.manage_bind（默认 127.0.0.1:8082）。
    # 误配为 5182 等无服务端口会导致 /calls/active 等转发接口 502。
    management_url: ""
    node_key_prefix: "vos_rs:cluster:sip_nodes"
    heartbeat_interval_secs: 3
    node_timeout_secs: 10
    dialog_ttl_secs: 86400
    nats_subject_prefix: "vos_rs.sip.node"
    inter_node_ack_timeout_ms: 500
    inter_node_max_retries: 3
    inter_node_retry_delay_ms: 50
    inter_node_dedupe_ttl_secs: 120
  network:
    sip_udp_bind: "0.0.0.0:5060"
    advertised_addr: "127.0.0.1:5060"
    manage_bind: "127.0.0.1:8082"
    ws_bind: "0.0.0.0:5062"
  routing:
    default_gateway: "127.0.0.1:5190"
    database_routes_enabled: false
    gateway_health_checks_enabled: false
  nat_traversal:
    stun_server: ""
    upnp_enabled: false
  security:
    # 必须与 api_server.security.internal_secret 一致，详见 api_server 段说明
    internal_secret: "compose-internal-secret"
  auth:
    enabled: false
    users: ""
    realm: "vos-rs"
    nonce: "vos-rs-dev-nonce"
    secret_key: "change-me"
  media:
    allocation_strategy: "weighted_round_robin" # weighted_round_robin | least_sessions | call_id_hash
    health_check_interval_secs: 3
    unhealthy_threshold: 3
    # 至少配置一个节点；local 最多一个，remote 可配置多个，也可以混合调度。
    # 当前要求各节点 RTP 端口段不重叠。
    nodes:
      - id: "local-media"
        type: "local"
        advertised_addr: "127.0.0.1"
        port_min: 20000
        port_max: 60000
        weight: 1
    # nodes:
    #   - id: "media-edge-1"
    #     type: "remote"
    #     control_url: "http://10.0.1.11:3030"
    #     advertised_addr: "203.0.113.11"
    #     port_min: 40000
    #     port_max: 40998
    #     weight: 1
    #     control_token: "replace-with-random-token"
    symmetric_learning: true
    anti_spoofing: true
    source_relearn_secs: 30
    metrics_log: false
  recording:
    enabled: false
    directory: "target/recordings"
    retention_secs: 604800
    min_free_bytes: 536870912
    max_file_bytes: 134217728
    max_duration_secs: 3600
    workers: 4
    queue_capacity: 10000
  billing:
    balance_enforcement_enabled: false
    settlement_enabled: true
  performance:
    cdr_queue_capacity: 4096
    cdr_persistence_enabled: true
    udp_workers: 4
    udp_workers_auto: true
    udp_receive_buffer_bytes: 4194304
    udp_send_buffer_bytes: 4194304
  # Webhook 最小闭环：呼叫事件 -> NATS -> 签名 HTTP -> Redis 投递记录
  webhooks:
    enabled: false
    endpoint_url: "http://127.0.0.1:8090/webhooks/calls"
    # 生产环境必须替换为至少 16 字符的随机密钥。
    signing_secret: "change-this-webhook-secret"
    stream: "VOS_RS_WEBHOOKS"
    subject: "vos_rs.webhooks.calls"
    consumer: "vos_rs_webhook_delivery"
    queue_capacity: 4096
    request_timeout_ms: 3000
    max_deliveries: 5
    retry_delay_ms: 1000
    delivery_record_ttl_secs: 604800

# ==========================================
# 3. api-server 管理控制台后端服务配置
# ==========================================
api_server:
  network:
    port: 8081
    allowed_origins: ""
  security:
    jwt_secret: "secret"
    # 必须与 sip-edge 的 sip_edge.security.internal_secret 一致，
    # api-server 用此生成 X-VOS-Token，sip-edge manage API 用此验证。
    # 当前 sip-edge 运行在 Docker（config.compose.yaml），其值为 compose-internal-secret。
    internal_secret: "compose-internal-secret"
  admin_credentials:
    admin_password: "admin"
    operator_password: "operator"
    financier_password: "financier"

# ==========================================
# 4. cdr-worker 话单入库消费者服务配置
# ==========================================
cdr_worker:
  queue:
    nats_cdr_consumer: "vos_rs_cdr_worker"
    nats_cdr_dlq_subject: "vos_rs.cdr.dlq"
    nats_cdr_dlq_stream: "VOS_RS_CDR_DLQ"
  batch_settings:
    max_batch_size: 100
    batch_timeout_ms: 1000
    max_deliveries: 3
    nak_delay_ms: 5000
    db_retry_attempts: 5

# 注：LLM 配置已迁移至数据库 llm_configs 表，通过 Web 界面「系统与安全 → LLM 配置」管理，
# 支持多厂商（智谱/通义/文心/DeepSeek/Kimi/OpenAI/自定义）动态切换，无需重启服务。

