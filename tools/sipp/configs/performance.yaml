connections:
  database:
    host: "127.0.0.1"
    port: 5432
    username: "tangyu"
    password: ""
    database: "vos_rs"
    max_connections: 20
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
    database: 0
    max_connections: 20
  nats:
    url: "nats://127.0.0.1:4222"
    cdr_stream: "VOS_RS_CDR"
    cdr_subject: "vos_rs.cdr"

sip_edge:
  dynamic_config:
    enabled: false
  billing:
    balance_enforcement_enabled: false
    settlement_enabled: false
  network:
    sip_udp_bind: "127.0.0.1:5160"
    advertised_addr: "127.0.0.1:5160"
    manage_bind: "127.0.0.1:5182"
    ws_bind: "127.0.0.1:5183"
  routing:
    default_gateway: "127.0.0.1:5170"
    gateway_health_checks_enabled: false
  security:
    internal_secret: "sipp-performance-secret"
    sbc_rate_limit_enabled: false
    sbc_max_concurrency: 100000
  media:
    nodes:
      - id: "local-media"
        type: "local"
        advertised_addr: "127.0.0.1"
        port_min: 10000
        port_max: 38000
        weight: 1
    symmetric_learning: true
    anti_spoofing: true
    source_relearn_secs: 30
    metrics_log: true
  recording:
    enabled: false
    directory: "target/sipp_bench_media_recordings"
    workers: 4
    queue_capacity: 4096
  performance:
    cdr_queue_capacity: 100000
    cdr_persistence_enabled: true
    udp_workers: 4
    udp_workers_auto: true
    udp_receive_buffer_bytes: 4194304
    udp_send_buffer_bytes: 4194304
logging:
  filter: "warn"
