#!KAMAILIO

debug=2
log_stderror=yes
fork=yes
children=8

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "sanity.so"
loadmodule "textops.so"
loadmodule "dispatcher.so"
loadmodule "htable.so"

modparam("rr", "append_fromtag", 1)
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "ds_ping_interval", 3)
modparam("dispatcher", "ds_probing_threshold", 2)
modparam("dispatcher", "ds_inactive_threshold", 2)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_mode", 1)
modparam("htable", "htable", "sip_dialog=>size=14;autoexpire=86400;")

request_route {
    if (!mf_process_maxfwd_header("16")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        exit;
    }

    if (is_method("OPTIONS") && uri == myself) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (has_totag()) {
        if (!loose_route()) {
            sl_send_reply("404", "Not Here");
            exit;
        }
        if ($sht(sip_dialog=>$ci) != $null) {
            $du = $sht(sip_dialog=>$ci);
        }
        if (is_method("BYE")) {
            $sht(sip_dialog=>$ci) = $null;
        }
        route(RELAY);
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        if (t_check_trans()) {
            exit;
        }
    }

    if ($sht(sip_dialog=>$ci) != $null) {
        $du = $sht(sip_dialog=>$ci);
    } else {
        # dispatcher 算法 0 按 Call-ID 哈希；失败路由只迁移尚未建立的事务。
        if (!ds_select_dst("1", "0")) {
            sl_send_reply("503", "No SIP Edge Available");
            exit;
        }
        $sht(sip_dialog=>$ci) = $du;
    }

    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }
    t_on_failure("SIP_EDGE_FAILOVER");
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

failure_route[SIP_EDGE_FAILOVER] {
    if (t_is_canceled()) {
        exit;
    }
    if (ds_next_dst()) {
        $sht(sip_dialog=>$ci) = $du;
        t_on_failure("SIP_EDGE_FAILOVER");
        t_relay();
    }
}
