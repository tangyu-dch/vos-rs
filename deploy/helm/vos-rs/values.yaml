replicaCount: 2

image:
  repository: vos-rs/sip-edge
  pullPolicy: IfNotPresent
  tag: "latest"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

env:
  VOS_RS_DATABASE_URL: "postgres://postgres:postgres@postgres-service:5432/vos_rs"
  VOS_RS_REDIS_URL: "redis://redis-service:6379/0"
  VOS_RS_NATS_URL: "nats://nats-service:4222"
