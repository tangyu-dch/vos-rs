# VOS-RS Docker Compose 配置
# 使用方法:
#   开发环境: docker-compose up -d
#   生产环境: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   查看日志: docker-compose logs -f [service]
#   停止服务: docker-compose down

x-vos-rs-backend: &vos-rs-backend
  image: vos-rs/backend:local
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile
  environment:
    VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml

services:
  # ========== 基础设施 ==========

  postgres:
    image: postgres:16-alpine
    container_name: vos-rs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vos_rs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vos_rs}
      POSTGRES_DB: ${POSTGRES_DB:-vos_rs}
      # 性能优化
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vos_rs_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vos_rs}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - vos_rs_network

  nats:
    image: nats:2.10-alpine
    container_name: vos-rs-nats
    command: [
      "--js",
      "--store_dir", "/data",
      "--port", "4222",
      "--http_port", "8222"
    ]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - vos_rs_nats:/data
    healthcheck:
      test: ["CMD-SHELL", "nats-server --help > /dev/null 2>&1 || wget -qO- http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - vos_rs_network

  redis:
    image: redis:7-alpine
    container_name: vos-rs-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - vos_rs_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - vos_rs_network

  # RustFS：S3 兼容对象存储，录音归档到 recordings bucket。
  rustfs:
    image: rustfs/rustfs:latest
    container_name: vos-rs-rustfs
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: "${RUSTFS_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${RUSTFS_SECRET_KEY:-rustfsadmin}"
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - vos_rs_rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - vos_rs_network

  # 首次启动时创建录音桶；mc mb --ignore-existing 保证重复启动幂等。
  rustfs-init:
    image: minio/mc:latest
    container_name: vos-rs-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      "mc alias set rustfs http://rustfs:9000
      ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      ${RUSTFS_SECRET_KEY:-rustfsadmin};
      mc mb --ignore-existing rustfs/${RUSTFS_BUCKET:-recordings}"
    restart: "no"
    networks:
      - vos_rs_network

  # ========== 应用服务 ==========

  sip-router:
    <<: *vos-rs-backend
    container_name: vos-rs-sip-router
    command: ["./sip-router"]
    ports:
      - "${SIP_UDP_PORT:-5060}:5060/udp"
      - "${SIP_TCP_PORT:-5060}:5060/tcp"
      - "${SIP_ROUTER_MANAGE_PORT:-8083}:8083"
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:-./config.compose.yaml}:/etc/vos-rs/config.yaml:ro"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - vos_rs_network

  media-edge:
    <<: *vos-rs-backend
    container_name: vos-rs-media-edge
    command: ["./media-edge"]
    ports:
      - "${MEDIA_CONTROL_PORT:-3030}:3030"
      - "${RTP_PORT_MIN:-40000}-${RTP_PORT_MAX:-40100}:40000-40100/udp"
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:-./config.compose.yaml}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - vos_rs_network

  sip-edge:
    <<: *vos-rs-backend
    container_name: vos-rs-sip-edge
    command: ["./sip-edge"]
    ports:
      - "${MANAGE_PORT:-8082}:8082"
      - "${SIP_WS_PORT:-5062}:5062"
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:-./config.compose.yaml}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      media-edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - vos_rs_network

  api-server:
    <<: *vos-rs-backend
    container_name: vos-rs-api-server
    command: ["./api-server"]
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:-./config.compose.yaml}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      sip-edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - vos_rs_network

  cdr-worker:
    <<: *vos-rs-backend
    container_name: vos-rs-cdr-worker
    command: ["./cdr-worker"]
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:-./config.compose.yaml}:/etc/vos-rs/config.yaml:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vos_rs_network

  # ========== 前端 ==========

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
    container_name: vos-rs-web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - vos_rs_network

# ========== 网络 ==========

networks:
  vos_rs_network:
    driver: bridge
    name: vos_rs_network

# ========== 卷 ==========

volumes:
  vos_rs_pg:
    driver: local
    name: vos_rs_pg
  vos_rs_nats:
    driver: local
    name: vos_rs_nats
  vos_rs_redis:
    driver: local
    name: vos_rs_redis
  vos_rs_recordings:
    driver: local
    name: vos_rs_recordings
  vos_rs_rustfs:
    driver: local
    # RustFS 升级或本地测试发生元数据不兼容时，可通过
    # RUSTFS_VOLUME_NAME 指向新卷，保留旧卷以便后续迁移和恢复。
    name: ${RUSTFS_VOLUME_NAME:-vos_rs_rustfs}
