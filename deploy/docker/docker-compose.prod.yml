# 生产环境配置覆盖
# 使用方法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    # 生产环境不暴露端口到宿主机
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    # 生产环境使用更强的资源限制
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  nats:
    # 生产环境不暴露端口到宿主机
    ports: []
    command: [
      "--js",
      "--store_dir", "/data",
      "--max_file", "1gb",
      "--max_mem", "256mb",
      "--port", "4222",
      "--http_port", "8222",
      # 生产环境启用监控认证
      "--username", "${NATS_USER:?请设置 NATS_USER}",
      "--password", "${NATS_PASSWORD:?请设置 NATS_PASSWORD}"
    ]

  redis:
    ports: []
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?请设置 REDIS_PASSWORD}"]

  rustfs:
    ports: []
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?请设置 RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?请设置 RUSTFS_SECRET_KEY}

  rustfs-init:
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?请设置 RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?请设置 RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-recordings}

  sip-router:
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:?请提供生产配置文件路径}:/etc/vos-rs/config.yaml:ro"
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
      VOS_RS_ENV: production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  sip-edge:
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:?请提供生产配置文件路径}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
      - vos_rs_cdr_spool:/data/cdr-spool
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
      VOS_RS_ENV: production
      VOS_RS_CDR_SPOOL_DIR: /data/cdr-spool
      VOS_RS_INTERNAL_SECRET: ${VOS_RS_INTERNAL_SECRET:?请设置 VOS_RS_INTERNAL_SECRET}
      VOS_RS_SIP_AUTH_SECRET: ${VOS_RS_SIP_AUTH_SECRET:?请设置 VOS_RS_SIP_AUTH_SECRET}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  media-edge:
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:?请提供生产配置文件路径}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
      VOS_RS_ENV: production
      VOS_RS_MEDIA_CONTROL_TOKEN: ${VOS_RS_MEDIA_CONTROL_TOKEN:?请设置 VOS_RS_MEDIA_CONTROL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  api-server:
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:?请提供生产配置文件路径}:/etc/vos-rs/config.yaml:ro"
      - vos_rs_recordings:/data/recordings
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
      VOS_RS_ENV: production
      VOS_RS_INTERNAL_SECRET: ${VOS_RS_INTERNAL_SECRET:?请设置 VOS_RS_INTERNAL_SECRET}
      VOS_RS_API_JWT_SECRET: ${VOS_RS_API_JWT_SECRET:?请设置 VOS_RS_API_JWT_SECRET}
      VOS_RS_ADMIN_PASSWORD: ${VOS_RS_ADMIN_PASSWORD:?请设置 VOS_RS_ADMIN_PASSWORD}
      VOS_RS_OPERATOR_PASSWORD: ${VOS_RS_OPERATOR_PASSWORD:?请设置 VOS_RS_OPERATOR_PASSWORD}
      VOS_RS_FINANCIER_PASSWORD: ${VOS_RS_FINANCIER_PASSWORD:?请设置 VOS_RS_FINANCIER_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  cdr-worker:
    volumes:
      - "${VOS_RS_CONFIG_FILE_HOST:?请提供生产配置文件路径}:/etc/vos-rs/config.yaml:ro"
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
      VOS_RS_ENV: production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  web:
    deploy:
      resources:
        limits:
          memory: 256M
