# 生产环境配置覆盖
# 使用方法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    # 生产环境不暴露端口到宿主机
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    # 生产环境使用更强的资源限制
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  nats:
    # 生产环境不暴露端口到宿主机
    ports: []
    command: [
      "--js",
      "--store_dir", "/data",
      "--max_file", "1gb",
      "--max_mem", "256mb",
      "--port", "4222",
      "--http_port", "8222",
      # 生产环境启用监控认证
      "--username", "${NATS_USER:-nats_admin}",
      "--password", "${NATS_PASSWORD:?请设置 NATS_PASSWORD}"
    ]

  sip-edge:
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  api-server:
    environment:
      VOS_RS_CONFIG_FILE: /etc/vos-rs/config.yaml
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M

  web:
    deploy:
      resources:
        limits:
          memory: 256M
